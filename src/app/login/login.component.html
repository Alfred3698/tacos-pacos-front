<!-- LOGIN CENTRADO -->

<div class="login-container">
    <h1><img src="../../assets/logo-tacospacos.svg" alt="Logo Tacos Pacos"/></h1>
    <form action="#" method="post">
        <label for="username">Usuario:</label>
        <input type="text" [(ngModel)]="email" id="username" name="username" required>   
        <label for="password">Contraseña:</label>
        <input type="password" [(ngModel)]="password" id="password" name="password" required> 
        <button class="button-login" (click)="onLogin()" value="1">Iniciar sesión</button>
    </form>
</div>
